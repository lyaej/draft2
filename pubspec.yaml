name: tagalook
description: TagaLook - Translate any language to Filipino/Tagalog

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ML Kit - OCR / Text Recognition
  google_mlkit_text_recognition: ^0.15.1

  # ML Kit - Language Detection
  google_mlkit_language_id: ^0.13.1

  # ML Kit - On-device Translation
  google_mlkit_translation: ^0.13.1

  # Camera
  camera: ^0.12.0+1

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Speech Recognition
  speech_to_text: ^7.3.0

  # Local Storage (SharedPreferences)
  shared_preferences: ^2.2.2

  # Date formatting (replaces SimpleDateFormat in Kotlin)
  intl: ^0.20.2

  cupertino_icons: ^1.0.6


flutter:
  uses-material-design: true
  assets:
    - assets/images/tagalook_logo.png

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/tagalook_logo.png"